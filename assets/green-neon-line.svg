<svg width="100%" height="20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00FF99;stop-opacity:1">
        <animate attributeName="stop-opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
        <animate attributeName="stop-color" values="#00FF99;#55FFBB;#00FF99" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background transparent to ensure blending -->
  <rect x="0" y="8" width="100%" height="4" fill="url(#grad)" filter="url(#glow)"/>
</svg>
