<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 320" width="12" height="320" preserveAspectRatio="none">
  <defs>
    <filter id="gl" x="-100%" y="-5%" width="300%" height="110%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="12" height="320" fill="#0d1117"/>
  <!-- Track line dim -->
  <line x1="6" y1="0" x2="6" y2="320" stroke="#1c2c1c" stroke-width="1"/>
  <!-- Snake glow — chạy từ trên xuống dưới -->
  <line x1="6" y1="0" x2="6" y2="320"
    stroke="#00FF88" stroke-width="10" stroke-opacity="0.18"
    stroke-dasharray="120 200" stroke-dashoffset="-320"
    filter="url(#gl)">
    <animate attributeName="stroke-dashoffset" from="-320" to="320" dur="3.5s" repeatCount="indefinite" calcMode="linear"/>
  </line>
  <!-- Snake body -->
  <line x1="6" y1="0" x2="6" y2="320"
    stroke="#00FF88" stroke-width="3.5" stroke-linecap="round"
    stroke-dasharray="120 200" stroke-dashoffset="-320"
    filter="url(#gl)">
    <animate attributeName="stroke-dashoffset" from="-320" to="320" dur="3.5s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="stroke" values="#00FF88;#00EEFF;#00FF88" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <!-- Snake head bright dot -->
  <line x1="6" y1="0" x2="6" y2="320"
    stroke="white" stroke-width="2.5" stroke-linecap="round"
    stroke-dasharray="10 310" stroke-dashoffset="-320" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="-320" to="320" dur="3.5s" repeatCount="indefinite" calcMode="linear"/>
  </line>
</svg>
