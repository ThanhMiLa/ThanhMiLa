<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 20"
  width="900"
  height="20"
  preserveAspectRatio="none"
>
  <defs>
    <filter id="g1" x="-50%" y="-200%" width="200%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background transparent -->
  <rect width="900" height="20" fill="#0d1117"/>
  
  <!-- Snake line traveling left to right -->
  <line x1="0" y1="10" x2="900" y2="10" stroke="none"/>
  
  <!-- Snake 1: Green neon moving right -->
  <rect x="0" y="0" width="900" height="20" fill="none"
    stroke="#00FF88" stroke-width="4" stroke-opacity="0"
    stroke-dasharray="120 780" stroke-dashoffset="0"
    filter="url(#g1)">
    <animate attributeName="stroke-dashoffset" from="-900" to="900" dur="3s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="stroke-opacity" values="0.8;0.8" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
