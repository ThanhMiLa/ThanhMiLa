<!-- RIGHT border snake: vertical, snake chạy từ dưới lên trên (ngược chiều) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 320" width="12" height="320" preserveAspectRatio="none">
  <defs>
    <filter id="gr"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="12" height="320" fill="#0d1117"/>
  <line x1="6" y1="0" x2="6" y2="320" stroke="#2a1a1a" stroke-width="1"/>
  <!-- Snake glow (pink going up) -->
  <rect x="0" y="-200" width="12" height="320" fill="none" stroke="#FF2D8B" stroke-width="10" stroke-opacity="0.15" stroke-dasharray="120 200" stroke-dashoffset="0" filter="url(#gr)">
    <animate attributeName="stroke-dashoffset" from="320" to="-320" dur="4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>
  <!-- Snake body -->
  <rect x="0" y="-200" width="12" height="320" fill="none" stroke="#FF2D8B" stroke-width="4" stroke-dasharray="120 200" stroke-dashoffset="0" filter="url(#gr)">
    <animate attributeName="stroke-dashoffset" from="320" to="-320" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="stroke" values="#FF2D8B;#FF8C00;#FFD700;#FF2D8B" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Snake head -->
  <rect x="0" y="-200" width="12" height="320" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="10 310" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" from="320" to="-320" dur="4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>
</svg>
